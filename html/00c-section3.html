<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>섹션 3 - 벤치마킹 &amp; 전략</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background: #E8F5E9; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .slide-container { width: 1280px; height: 720px; background: linear-gradient(135deg, #E8F5E9 0%, #C8E6C9 100%); position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); overflow: hidden; }
        .section-badge { background: #2E7D32; color: white; font-size: 14pt; font-weight: 700; padding: 0.5rem 1.5rem; border-radius: 9999px; margin-bottom: 1.5rem; }
        .section-title { font-size: 28pt; font-weight: 800; color: #1B5E20; line-height: 1.3; text-align: center; }
        .section-desc { font-size: 14pt; color: #2E7D32; margin-top: 1rem; opacity: 0.9; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="section-badge">Section 3</div>
        <h1 class="section-title">벤치마킹 &amp; 전략</h1>
        <p class="section-desc">대상 분석, 비교 매트릭스, 인사이트 및 권고안</p>
    </div>
</body>
</html>

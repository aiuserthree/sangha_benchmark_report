<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EOD - End of Document</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="common-report.css" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; margin: 0; padding: 0; background: #f3f4f6; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .slide-container { width: 1280px; height: 720px; background: #fff; position: relative; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); display: flex; flex-direction: column; overflow: hidden; }
        .eod-body { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .eod-title { font-size: 22pt; font-weight: 800; color: #2E7D32; margin-bottom: 1rem; }
        .eod-sub { font-size: 14pt; color: #6B7280; }
        .eod-divider { width: 120px; height: 4px; background: #2E7D32; margin: 2rem 0; border-radius: 2px; }
    </style>
</head>
<body>
    <div class="slide-container">
        <div class="eod-body">
            <h2 class="eod-title">End of Document</h2>
            <div class="eod-divider"></div>
            <p class="eod-sub">상하농원몰 벤치마킹 분석 리포트</p>
            <p class="eod-sub text-sm mt-2">ibank AX</p>
        </div>
        <div class="absolute bottom-4 right-6 text-gray-400 text-xs">p. 23</div>
    </div>
</body>
</html>
